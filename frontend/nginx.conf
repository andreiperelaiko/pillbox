# Фрагмент для /etc/nginx/sites-available/pillbox
# Корень домена — C4-диаграммы; фронтенд — /site/; API — /api/

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name pi11box.ru;

    ssl_certificate /etc/letsencrypt/live/pi11box.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pi11box.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /docs {
        return 301 /api/docs;
    }

    location = /site {
        return 301 /site/;
    }

    location /site/ {
        root /var/www/pillbox-frontend;
        try_files $uri $uri/ /site/index.html;
    }

    location = /er {
        return 301 /er/;
    }

    location /er/ {
        alias /var/www/pillbox-er/;
        index index.html;
    }

    root /var/www/pillbox-architecture;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
